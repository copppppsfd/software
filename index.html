<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Undangan Ulang Tahun Shava 🎀</title>
<link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Nunito:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --purple: #c084fc;
    --purple-dark: #7c3aed;
    --purple-light: #e9d5ff;
    --pink: #f472b6;
    --pink-light: #fce7f3;
    --lavender: #ddd6fe;
    --sky: #bae6fd;
    --bg: #f5e6ff;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: linear-gradient(160deg, #f0d6ff 0%, #fce7f3 40%, #dbeafe 100%);
    min-height: 100vh;
    font-family: 'Nunito', sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    overflow-x: hidden;
  }

  /* Floating sparkles background */
  .sparkle-bg {
    position: fixed;
    inset: 0;
    pointer-events: none;
    overflow: hidden;
    z-index: 0;
  }

  .sp {
    position: absolute;
    width: var(--s, 12px);
    height: var(--s, 12px);
    background: var(--purple);
    clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
    opacity: 0;
    animation: sparkleFly var(--d, 4s) ease-in-out infinite;
    animation-delay: var(--delay, 0s);
  }

  @keyframes sparkleFly {
    0% { opacity: 0; transform: translateY(0) rotate(0deg) scale(0); }
    20% { opacity: 0.8; transform: translateY(-30px) rotate(90deg) scale(1); }
    80% { opacity: 0.6; }
    100% { opacity: 0; transform: translateY(-120px) rotate(360deg) scale(0.3); }
  }

  /* Card */
  .card {
    position: relative;
    z-index: 2;
    background: white;
    border-radius: 32px;
    max-width: 440px;
    width: 100%;
    box-shadow: 0 8px 40px rgba(192, 132, 252, 0.35), 0 2px 8px rgba(244, 114, 182, 0.2);
    overflow: hidden;
    animation: popIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) both;
  }

  @keyframes popIn {
    from { opacity: 0; transform: scale(0.8) translateY(30px); }
    to { opacity: 1; transform: scale(1) translateY(0); }
  }

  /* Header */
  .header {
    background: linear-gradient(135deg, #ddd6fe 0%, #f5d0fe 50%, #fce7f3 100%);
    padding: 30px 24px 20px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }

  .header::before {
    content: '';
    position: absolute;
    top: -20px; left: -20px;
    width: 120px; height: 120px;
    background: rgba(192,132,252,0.2);
    border-radius: 50%;
  }

  .header::after {
    content: '';
    position: absolute;
    bottom: -30px; right: -20px;
    width: 150px; height: 150px;
    background: rgba(244,114,182,0.15);
    border-radius: 50%;
  }

  .rainbow {
    display: flex;
    justify-content: center;
    gap: 4px;
    margin-bottom: 10px;
  }

  .rainbow span {
    font-size: 20px;
    animation: bounce var(--bd, 1s) ease-in-out infinite alternate;
    animation-delay: var(--bdelay, 0s);
  }

  @keyframes bounce {
    from { transform: translateY(0); }
    to { transform: translateY(-8px); }
  }

  /* Kuromi character SVG area */
  .kuromi-area {
    display: flex;
    justify-content: center;
    position: relative;
    z-index: 1;
    margin: 5px 0;
    animation: floatKuromi 3s ease-in-out infinite;
    
  }
    .kuromi-img {
    width: 200px;
    max-width: 90%;
    height: auto;
    display: block;
  }

  @keyframes floatKuromi {
    0%, 100% { transform: translateY(0) rotate(-1deg); }
    50% { transform: translateY(-10px) rotate(1deg); }
  }

  .header-title {
    font-family: 'Pacifico', cursive;
    font-size: 13px;
    color: #a855f7;
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-top: 8px;
    position: relative;
    z-index: 1;
  }

  /* Body */
  .body {
    padding: 24px;
  }

  .you-are-invited {
    text-align: center;
    margin-bottom: 20px;
  }

  .you-are-invited .sub {
    font-size: 12px;
    color: #a855f7;
    letter-spacing: 4px;
    text-transform: uppercase;
    font-weight: 700;
  }

  .you-are-invited .name {
    font-family: 'Pacifico', cursive;
    font-size: 28px;
    background: linear-gradient(135deg, #a855f7, #ec4899);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1.2;
    margin: 6px 0;
  }

  .you-are-invited .celebrate {
    font-size: 13px;
    color: #9ca3af;
    font-weight: 600;
  }

  /* Divider bow */
  .divider {
    display: flex;
    align-items: center;
    gap: 8px;
    margin: 16px 0;
  }

  .divider-line {
    flex: 1;
    height: 1.5px;
    background: linear-gradient(to right, transparent, #e9d5ff, transparent);
  }

  .divider-icon {
    font-size: 18px;
    animation: spin 4s linear infinite;
  }

  @keyframes spin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }

  /* Info cards */
  .info-grid { display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 12px;
              margin-bottom: 16px;
  }

  .info-grid2 { grid-column: span 2;
  max-width: 160px;
  justify-self: center; margin-bottom: 16px;
  }

  .info-card {
    background: linear-gradient(135deg, #faf5ff, #fdf2f8);
    border: 1.5px solid #e9d5ff;
    border-radius: 16px;
    padding: 14px 12px;
    text-align: center;
    transition: transform 0.2s;
  }

  .info-card:hover {
    transform: translateY(-3px);
    box-shadow: 0 6px 20px rgba(192,132,252,0.2);
  }

  .info-card .icon {
    font-size: 22px;
    margin-bottom: 6px;
    display: block;
  }

  .info-card .label {
    font-size: 10px;
    color: #a855f7;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 4px;
  }

  .info-card .value {
    font-size: 13px;
    font-weight: 900;
    color: #6d28d9;
    line-height: 1.3;
  }

  /* Theme badge */
  .theme-card {
    background: linear-gradient(135deg, #7c3aed, #c084fc, #ec4899);
    border-radius: 16px;
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 16px;
  }

  .theme-emoji {
    font-size: 28px;
    animation: wiggle 1.5s ease-in-out infinite;
  }

  @keyframes wiggle {
    0%, 100% { transform: rotate(-8deg); }
    50% { transform: rotate(8deg); }
  }

  .theme-text .tl { font-size: 11px; color: rgba(255,255,255,0.8); letter-spacing: 2px; text-transform: uppercase; font-weight: 700; }
  .theme-text .tv { font-family: 'Pacifico', cursive; font-size: 20px; color: white; }

  /* Stars decoration in theme card */
  .theme-stars {
    margin-left: auto;
    display: flex;
    flex-direction: column;
    gap: 2px;
    opacity: 0.7;
  }

  .theme-stars span { font-size: 14px; color: white; }

  /* RSVP / Footer */
  .footer {
    background: linear-gradient(135deg, #faf5ff, #fdf2f8);
    border-top: 1.5px dashed #e9d5ff;
    padding: 16px 24px;
    text-align: center;
  }

  .footer p {
    font-size: 12px;
    color: #9ca3af;
    font-weight: 600;
  }

  .footer .hearts {
    font-size: 18px;
    letter-spacing: 4px;
    margin-top: 6px;
    animation: heartbeat 1.2s ease-in-out infinite;
  }

  @keyframes heartbeat {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.15); }
  }

  /* Clouds decoration */
  .clouds {
    position: absolute;
    top: 10px;
    width: 100%;
    display: flex;
    justify-content: space-between;
    padding: 0 10px;
    z-index: 0;
    pointer-events: none;
  }

  .cloud {
    font-size: 24px;
    opacity: 0.6;
    animation: cloudFloat 4s ease-in-out infinite alternate;
  }

  .cloud:nth-child(2) { animation-delay: 1s; animation-direction: alternate-reverse; }

  @keyframes cloudFloat {
    from { transform: translateX(-5px); }
    to { transform: translateX(5px); }
  }
</style>
</head>
<body>

<!-- Sparkle background -->
<div class="sparkle-bg" id="sparkles"></div>

<div class="card">

  <!-- Header -->
  <div class="header">
    <div class="clouds">
      <span class="cloud">☁️</span>
      <span class="cloud">☁️</span>
    </div>

    <div class="rainbow">
      <span style="--bd:0.8s;--bdelay:0s">🌈</span>
      <span style="--bd:0.8s;--bdelay:0.1s">⭐</span>
      <span style="--bd:0.8s;--bdelay:0.2s">✨</span>
      <span style="--bd:0.8s;--bdelay:0.3s">⭐</span>
      <span style="--bd:0.8s;--bdelay:0.4s">🌈</span>
    </div>

    <!-- Kuromi SVG Character - Cute pastel version -->
    <div class="kuromi-area">
      <img src="advawvw(1).png" alt="Kuromi & My Melody" class="kuromi-img">
    </div>

    <p class="header-title">✨ You're Invited ✨</p>
  </div>

  <!-- Body -->
  <div class="body">

    <div class="you-are-invited">
      <p class="sub">🎀 Ulang Tahun 🎀</p>
      <p class="name">Shava Nurramdhania</p>
      <p class="celebrate">Yuk rayakan bersama! 🎉</p>
    </div>

    <div class="divider">
      <div class="divider-line"></div>
      <span class="divider-icon">✦</span>
      <div class="divider-line"></div>
    </div>

    <div class="info-grid">
      <div class="info-card">
        <span class="icon">📅</span>
        <div class="label">Hari & Tanggal</div>
        <div class="value">Minggu<br>26 April 2026</div>
      </div>
      <div class="info-card">
        <span class="icon">⏰</span>
        <div class="label">Waktu</div>
        <div class="value">09.30 WIB<br>s/d Selesai</div>
      </div>
    </div>
     <div class="info-grid2">
      <div class="info-card">
        <span class="icon">📍</span>
        <div class="label">Tempat</div>
        <div class="value">Dirumahku</div>
      </div>
   

 
  </div>

  <!-- Footer -->
  <div class="footer">
    <p>Kehadiranmu adalah hadiah terindah! 🎁</p>
    <p>Datang ya, jangan sampai ketinggalan~ 🐾</p>
    <div class="hearts">💗 🖤 💗 🖤 💗</div>
  </div>

</div>

<script>
  // Generate sparkles
  const container = document.getElementById('sparkles');
  const colors = ['#c084fc','#f472b6','#fbbf24','#a855f7','#ec4899','#e879f9'];
  for (let i = 0; i < 25; i++) {
    const sp = document.createElement('div');
    sp.className = 'sp';
    sp.style.cssText = `
      left: ${Math.random()*100}vw;
      top: ${20 + Math.random()*80}vh;
      --s: ${8 + Math.random()*14}px;
      --d: ${3 + Math.random()*4}s;
      --delay: ${Math.random()*5}s;
      background: ${colors[Math.floor(Math.random()*colors.length)]};
    `;
    container.appendChild(sp);
  }
</script>
</body>
</html>
